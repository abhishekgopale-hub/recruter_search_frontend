name: Deploy Search Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Search Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/recruter_search_frontend

            git pull origin main

            npm install

            npm run build

            sudo rm -rf /var/www/search/*

            sudo cp -r dist/* /var/www/search/

            sudo systemctl restart nginx